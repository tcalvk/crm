name: Pull on Remote Server

on:
  push:
    branches:
      - main

jobs:
  composer-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Validate composer files
        run: composer validate --no-check-publish

      - name: Install dependencies
        run: composer install --no-dev --prefer-dist --no-interaction

      - name: Check platform requirements
        run: composer check-platform-reqs

      - name: Verify Composer autoload
        run: php -r "require 'vendor/autoload.php'; echo 'autoload ok'.PHP_EOL;"

  deploy:
    needs: composer-check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: SSH into server and pull latest code
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            bash /var/www/update-crm.sh
